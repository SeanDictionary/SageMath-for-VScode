name: Publish and Create Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Publish and Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # 确保有权创建 Release
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Code
        run: npm run compile

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Build VSIX
        run: |
          if [[ ${{ github.ref_name }} == *-* ]]; then
            echo "检测到先行版本标签，正在打包预发布版..."
            vsce package --pre-release -o ./SageMath-for-VSCode-${{ github.ref_name }}.vsix
          else
            echo "检测到正式版本标签，正在打包正式版..."
            vsce package -o ./SageMath-for-VSCode-${{ github.ref_name }}.vsix
          fi

      - name: Publish to Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [[ ${{ github.ref_name }} == *-* ]]; then
            echo "检测到先行版本标签，正在发布预发布版..."
            vsce publish --pre-release -p $VSCE_PAT --packagePath ./SageMath-for-VSCode-${{ github.ref_name }}.vsix
          else
            echo "检测到正式版本标签，正在发布正式版..."
            vsce publish -p $VSCE_PAT --packagePath ./SageMath-for-VSCode-${{ github.ref_name }}.vsix
          fi

      - name: Build Release Notes from Changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="$VERSION" '
            $0 ~ "^## \\["ver"\\]" {flag=1; print; next}
            flag && $0 ~ "^## \\[" {exit}
            flag {print}
          ' CHANGELOG.md > release_notes.md

          if [[ ! -s release_notes.md ]]; then
            echo "No changelog entry found for $VERSION" > release_notes.md
          fi

      - name: Extract Release Notes
        id: extract_release_notes
        run: |
          echo "contents<<EOF" >> "$GITHUB_OUTPUT"
          cat release_notes.md >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Find Previous Tag
        id: pre_tag
        run: |
          PREV=$(git tag --sort=-v:refname | grep -v "^${GITHUB_REF_NAME}$" | head -n 1 || true)
          echo "prev=$PREV" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # 使用 CHANGELOG 中对应版本内容
          body: |
            ${{ steps.extract_release_notes.outputs.contents }}
            
            ---
            ${{ steps.pre_tag.outputs.prev != '' && format('**Full Changelog**: https://github.com/{0}/compare/{1}...{2}', github.repository, steps.pre_tag.outputs.prev, github.ref_name) || 'Initial Release' }}
          # 如果 Tag 包含 '-'，GitHub 界面会标记为 Pre-release
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            ./SageMath-for-VSCode-${{ github.ref_name }}.vsix
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}